version: '3.9'

networks:
  erp-internal:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  pgdata-prod:
  redisdata-prod:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__ConnectionString: "Host=postgres;Port=5432;Database=autoparts_erp;Username=erp_user;Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379,abortConnect=false,password=${REDIS_PASSWORD}"
      Jwt__PrivateKeyPemBase64: "${JWT_PRIVATE_KEY}"
      Jwt__PublicKeyPemBase64: "${JWT_PUBLIC_KEY}"
      Jwt__Issuer: "AutoPartsERP"
      Jwt__Audience: "AutoPartsERP-Client"
      AllowedOrigins: "${ALLOWED_ORIGINS}"
      Observability__OtlpEndpoint: "http://tempo:4317"
      Serilog__WriteTo__2__Name: GrafanaLoki
      Serilog__WriteTo__2__Args__uri: "http://loki:3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - erp-internal
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: autoparts_erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d autoparts_erp"]
      interval: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata-prod:/data
    networks:
      - erp-internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - erp-internal

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - monitoring
      - erp-internal

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: "https://${GRAFANA_DOMAIN}"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:latest
    restart: unless-stopped
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - monitoring
